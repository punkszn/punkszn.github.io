<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Viewer</title>
<style>
body{
  margin:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial,sans-serif;
}
img{
  max-width:90%;
  max-height:75vh;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,255,255,.2);
}
.buttons{
  margin-top:20px;
  display:flex;
  gap:20px;
}
button{
  padding:14px 30px;
  border:none;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  transition:.3s;
}
#hlBtn{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  box-shadow:0 0 20px #00c6ff;
}
#orgBtn{
  background:linear-gradient(45deg,#ff8a00,#ff0058);
  box-shadow:0 0 20px #ff0058;
}
button:hover{
  transform:scale(1.08);
}
button:active{
  transform:scale(0.96);
}
</style>
</head>
<body>

<img id="nftImage" src="">

<div class="buttons">
  <button id="hlBtn" onclick="showImage('hl')">HL</button>
  <button id="orgBtn" onclick="showImage('org')">ORG</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token') || '1';

const BASE = 'https://gateway.pinata.cloud/ipfs/bafybeid7g4xscq2riy7zlz3vtsdd7rxkw5hjgulveubiy7rm4vgml3q4ka';

function showImage(type){
  document.getElementById('nftImage').src =
    `${BASE}/${type}/${token}.gif`;
}

showImage('hl');
</script>

</body>
</html>
