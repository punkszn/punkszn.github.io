<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFT Viewer</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #030712;
    }

    .nft-frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      transition: opacity 0.4s ease;
    }

    .btn-active {
      background-color: #111827 !important;
      color: #ffffff !important;
      border: 1.5px solid rgba(59, 130, 246, 0.6);
      box-shadow:
        0 0 25px rgba(59, 130, 246, 0.7),
        inset 0 0 15px rgba(59, 130, 246, 0.3);
    }
  </style>
</head>

<body class="h-full flex flex-col items-center justify-center overflow-auto">

  <div class="flex flex-col items-center gap-8 p-6">

    <!-- NFT Frame -->
    <div
      class="nft-frame relative w-[512px] h-[512px] max-w-[90vw] max-h-[90vw] rounded-2xl overflow-hidden border-2 border-gray-700 shadow-2xl bg-gray-900"
    >
      <img
        id="nftImage"
        src=""
        alt="NFT Artwork"
        class="opacity-0"
      />
    </div>

    <!-- Buttons -->
    <div class="flex gap-6">
      <button
        id="btnOrg"
        onclick="switchView('org')"
        class="px-8 py-3 rounded-xl font-semibold text-base transition-all duration-300 bg-gray-700 text-white hover:bg-gray-600"
      >
        Original
      </button>

      <button
        id="btnHl"
        onclick="switchView('hl')"
        class="px-8 py-3 rounded-xl font-semibold text-base transition-all duration-300 bg-gray-700 text-white hover:bg-gray-600"
      >
        Holographic
      </button>
    </div>

  </div>

  <script>
    /*
      GitHub repo structure:

      nftvier.github.io/
      ├── viewer.html
      ├── org/
      │   ├── 1.png
      │   ├── 2.png
      │   └── ...
      └── hl/
          ├── 1.gif
          ├── 2.gif
          └── ...
    */

    // IMPORTANT:
    // Use repository root URL only (NOT a file URL)
    const BASE = "https://raw.githubusercontent.com/mypunks/mypunks.github.io/main";

    // Read token ID from URL:
    // viewer.html?id=1
    const params = new URLSearchParams(window.location.search);
    const tokenId = params.get("id") || "1";

    const nftImage = document.getElementById("nftImage");
    const btnOrg = document.getElementById("btnOrg");
    const btnHl = document.getElementById("btnHl");

    let currentView = "org";

    function switchView(view) {
      currentView = view;

      // Fade out
      nftImage.style.opacity = "0";

      setTimeout(() => {
        if (view === "org") {
          nftImage.src = `${BASE}/org/${tokenId}.png`;
        } else {
          nftImage.src = `${BASE}/hl/${tokenId}.gif`;
        }

        nftImage.onload = () => {
          nftImage.style.opacity = "1";
        };

        nftImage.onerror = () => {
          console.error("File not found:", nftImage.src);
        };
      }, 200);

      updateButtons();
    }

    function updateButtons() {
      btnOrg.classList.toggle("btn-active", currentView === "org");
      btnHl.classList.toggle("btn-active", currentView === "hl");
    }

    // Load default view
    switchView("org");
  </script>

</body>
</html>
